name: Build App Registry

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours
  workflow_dispatch:        # Manual trigger
  push:
    branches: [main]
    paths: ['build_registry.py', 'external-apps.json']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Build registry from app repos
        env:
          # Use ORG_READ_TOKEN (PAT with repo read access) for private app repos.
          # Falls back to GITHUB_TOKEN which only has access to this repo.
          GITHUB_TOKEN: ${{ secrets.ORG_READ_TOKEN || secrets.GITHUB_TOKEN }}
        run: python3 build_registry.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add registry.json README.md COMMUNITY_APPS.md
          git diff --staged --quiet || git commit -m "chore: update registry.json [automated]"
          git pull --rebase origin main
          git push